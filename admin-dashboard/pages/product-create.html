<a href="#" class="back-link" data-page="products"><i class="fa-solid fa-arrow-left"></i> Back to Products</a>

<div class="page-header">
  <div>
    <h1 class="page-title">Add New Product</h1>
    <p class="page-subtitle">Fill in the details to create a new product listing.</p>
  </div>
</div>

<div class="row g-4">
  <!-- Main form -->
  <div class="col-lg-8">
    <div class="card mb-3">
      <div class="card-header-custom"><span class="card-title">Product Information</span></div>
      <div class="card-body-custom">
        <div class="form-group">
          <label class="form-label-custom">Product Name *</label>
          <input type="text" class="form-control-custom" placeholder="e.g. Wireless Headphones Pro" value="">
        </div>
        <div class="row g-3">
          <div class="col-md-6">
            <div class="form-group">
              <label class="form-label-custom">Category *</label>
              <select class="form-control-custom">
                <option value="" disabled selected>Select a category</option>
                <option>Electronics</option>
                <option>Clothing</option>
                <option>Furniture</option>
                <option>Accessories</option>
              </select>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label class="form-label-custom">SKU</label>
              <input type="text" class="form-control-custom" placeholder="e.g. WHP-001">
            </div>
          </div>
        </div>
        <div class="row g-3">
          <div class="col-md-6">
            <div class="form-group">
              <label class="form-label-custom">Price *</label>
              <div class="input-prefix-wrap" style="position:relative;">
                <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;">$</span>
                <input type="number" class="form-control-custom" style="padding-left:24px;" placeholder="0.00">
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label class="form-label-custom">Stock Quantity *</label>
              <input type="number" class="form-control-custom" placeholder="0">
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label-custom">Description</label>
          <textarea class="form-control-custom" placeholder="Describe the product in detail…"></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- Sidebar fields -->
  <div class="col-lg-4">
    <div class="card mb-3">
      <div class="card-header-custom"><span class="card-title">Product Image</span></div>
      <div class="card-body-custom">
        <div class="upload-zone" id="uploadZone">
          <i class="fa-solid fa-cloud-arrow-up"></i>
          <p>Click to upload or drag & drop</p>
          <span>PNG, JPG up to 5MB</span>
        </div>
        <input type="file" id="imageUpload" style="display:none;" accept="image/*">
        <div id="imgPreviewWrap" style="display:none; margin-top:12px;">
          <img id="imgPreview" style="width:100%;border-radius:var(--radius);border:1px solid var(--border);" alt="">
          <button class="btn-ghost w-100 mt-2" id="removeImg" style="font-size:12px;">Remove Image</button>
        </div>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-header-custom"><span class="card-title">Status</span></div>
      <div class="card-body-custom">
        <label class="toggle-switch">
          <input type="checkbox" id="statusToggle" checked>
          <span class="toggle-track"></span>
          <span style="font-size:13px; color:var(--text-muted);" id="statusLabel">Active — Visible to customers</span>
        </label>
      </div>
    </div>

    <div class="d-flex flex-column gap-2">
      <button class="btn-primary-custom w-100 justify-content-center" style="padding:11px;">
        <i class="fa-solid fa-floppy-disk"></i> Save Product
      </button>
      <button class="btn-ghost w-100 justify-content-center" data-page="products">Cancel</button>
    </div>
  </div>
</div>

<script>
$('#uploadZone').click(function(){ $('#imageUpload').click(); });
$('#imageUpload').change(function(){
  const file = this.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    $('#imgPreview').attr('src', e.target.result);
    $('#imgPreviewWrap').show();
    $('#uploadZone').hide();
  };
  reader.readAsDataURL(file);
});
$('#removeImg').click(function(){
  $('#imgPreviewWrap').hide();
  $('#uploadZone').show();
  $('#imageUpload').val('');
});
$('#statusToggle').change(function(){
  $('#statusLabel').text(this.checked ? 'Active — Visible to customers' : 'Inactive — Hidden from store');
});
</script>
