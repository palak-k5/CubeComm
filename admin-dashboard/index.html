<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CubeComm Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo-wrap">
      <span class="logo-icon"><i class="fa-solid fa-bolt"></i></span>
      <span class="logo-text">CubeComm</span>
    </div>
    <button class="sidebar-close-btn d-lg-none" id="sidebarCloseBtn"><i class="fa-solid fa-xmark"></i></button>
  </div>

  <nav class="sidebar-nav">
    <ul>
      <li><a href="#" class="nav-link active" data-page="dashboard"><i class="fa-solid fa-house"></i><span>Dashboard</span></a></li>
      <li><a href="#" class="nav-link" data-page="products"><i class="fa-solid fa-box-open"></i><span>Products</span></a></li>
      <li><a href="#" class="nav-link" data-page="categories"><i class="fa-solid fa-tags"></i><span>Categories</span></a></li>
      <li><a href="#" class="nav-link" data-page="orders"><i class="fa-solid fa-receipt"></i><span>Orders</span></a></li>
      <li><a href="#" class="nav-link" data-page="customers"><i class="fa-solid fa-users"></i><span>Customers</span></a></li>
      <li class="nav-divider"></li>
      <li><a href="#" class="nav-link" data-page="profile"><i class="fa-solid fa-circle-user"></i><span>Profile</span></a></li>
    </ul>
  </nav>

  <div class="sidebar-footer">
    <div class="admin-mini">
      <img src="https://i.pravatar.cc/36?img=12" alt="Admin" class="admin-avatar-sm">
      <div class="admin-mini-info">
        <span class="admin-mini-name">Alex Morgan</span>
        <span class="admin-mini-role">Super Admin</span>
      </div>
    </div>
  </div>
</aside>

<!-- Sidebar Overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Main wrapper -->
<div class="main-wrapper" id="mainWrapper">

  <!-- Top Navbar -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="toggle-btn" id="sidebarToggle">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" class="search-input" placeholder="Search anything…" id="globalSearch">
        <kbd class="search-kbd">⌘K</kbd>
      </div>
    </div>
    <div class="topbar-right">
      <button class="topbar-btn" title="Notifications">
        <i class="fa-regular fa-bell"></i>
        <span class="notif-dot"></span>
      </button>
      <button class="topbar-btn" title="Messages">
        <i class="fa-regular fa-comment-dots"></i>
      </button>
      <div class="dropdown">
        <button class="admin-profile-btn dropdown-toggle" data-bs-toggle="dropdown">
          <img src="https://i.pravatar.cc/36?img=12" alt="Admin" class="admin-avatar">
          <div class="admin-info d-none d-md-block">
            <span class="admin-name">Alex Morgan</span>
            <span class="admin-role">Super Admin</span>
          </div>
          <i class="fa-solid fa-chevron-down admin-caret"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end admin-dropdown">
          <li><a class="dropdown-item" href="#" data-page="profile"><i class="fa-regular fa-user"></i> My Profile</a></li>
          <li><a class="dropdown-item" href="#"><i class="fa-regular fa-gear"></i> Settings</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item text-danger" href="#"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sign Out</a></li>
        </ul>
      </div>
    </div>
  </header>

  <!-- Page content -->
  <main class="page-content" id="pageContent">
    <!-- Pages load here -->
  </main>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
