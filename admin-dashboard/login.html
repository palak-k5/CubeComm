<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login • CubeComm Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>


<body class="auth-page-body">

  <div class="auth-card">
    <div class="mb-3">
      <div class="auth-brand">CubeComm Admin</div>
      <div class="auth-subtitle">Sign in to your dashboard account.</div>
    </div>
    <form class="auth-form" onsubmit="event.preventDefault(); window.location.href='index.html';">
      <div class="mb-3">
        <label class="form-label" for="email">Email</label>
        <input id="email" type="email" class="form-control" placeholder="you@company.com" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <input id="password" type="password" class="form-control" placeholder="••••••••" required>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="remember">
          <label class="form-check-label text-light" for="remember">Remember me</label>
        </div>
        <a href="#" class="text-decoration-none link-light">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary w-100">Log In</button>
    </form>
    <div class="link-row text-center">
      Don’t have an account? <a href="signup.html">Create an account</a>
    </div>
  </div>
  
</body>
</html>
